<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- 초기 로딩 오버레이 -->

    <div class="st2">불러오는 중…</div>
  </div>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="hidden">

        <div class="brand-icon">◈</div>

        <input class="tds-input" type="password" name="password" placeholder="비밀번호" required autocomplete="current-password">
        <button class="tds-btn full" type="submit">로그인</button>

      </form>
      <button class="tds-btn secondary full" type="button" data-public-tab="newsfeed">뉴스 보기</button>
    </div>
  </div>

      <div class="left">
        <div class="title" id="header-title">가계부</div>
        <div class="ctx-action" id="header-context"><span class="dot"></span><span>오늘</span></div>
      </div>
      <div class="actions">
        <button class="icon-btn" id="btn-search" title="검색" type="button">⌕</button>
        <button class="icon-btn" id="btn-settings" title="설정" type="button">⚙</button>

    <main>

      <section class="tab-content hidden" id="tab-newsfeed" data-tab="newsfeed"></section>
      <section class="tab-content hidden" id="tab-finance" data-tab="finance"></section>
      <section class="tab-content hidden" id="tab-tx" data-tab="tx"></section>
      <section class="tab-content hidden" id="tab-mindbank" data-tab="mindbank"></section>
      <section class="tab-content hidden" id="tab-urge" data-tab="urge"></section>
      <section class="tab-content hidden" id="tab-settings" data-tab="settings"></section>
      <section class="tab-content hidden" id="tab-review" data-tab="review"></section>
      <section class="tab-content hidden" id="tab-settle" data-tab="settle"></section>
      <section class="tab-content hidden" id="tab-report" data-tab="report"></section>
    </main>

    <div id="modals-container"></div>
    <div id="toast-container"></div>

    <nav class="bottom-nav">
      <button data-tab="home" class="active" type="button">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h13v-9.5"></path><path d="M9.5 20v-5h5v5"></path></svg>
        </span>
        <span>홈</span>
      </button>
      <button data-tab="newsfeed" type="button">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false"><path d="M5 5.5h14v13H5z"></path><path d="M8 9h8"></path><path d="M8 12h8"></path><path d="M8 15h5"></path></svg>

      </button>
      <button data-tab="finance" type="button">

      <button data-tab="review" type="button">

          <svg viewBox="0 0 24 24" focusable="false"><path d="M8 4.5h8"></path><path d="M9 3h6l1 3H8l1-3Z"></path><rect x="5" y="5.5" width="14" height="15" rx="2"></rect><path d="m8.5 13 2 2 4.5-5"></path></svg>
