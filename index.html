<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6fa">
  <title>가계부</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%233b63ff'/%3E%3Cpath d='M9 18c4-8 10-8 14 0-4 6-10 6-14 0z' fill='white'/%3E%3Ccircle cx='16' cy='17' r='3' fill='%233b63ff'/%3E%3C/svg%3E">
  <link rel="manifest" href="./manifest.webmanifest?v=20260504-quota-guard">
  <link rel="stylesheet" href="./style.css?v=20260505-visual-modal">
</head>
<body>
  <!-- 초기 로딩 오버레이 -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="st2">불러오는 중…</div>
  </div>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="hidden">
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-icon">◈</div>
        <div class="t3">가계부</div>
        <div class="st2">한국 결제·이체 자동 정리</div>
      </div>
      <form id="login-form" class="login-form">
        <input class="tds-input" type="email" name="email" placeholder="이메일" required autocomplete="username">
        <input class="tds-input" type="password" name="password" placeholder="비밀번호" required autocomplete="current-password">
        <button class="tds-btn full" type="submit">로그인</button>
        <div class="st3 login-error" id="login-error"></div>
      </form>
    </div>
  </div>

  <!-- 앱 컨테이너 -->
  <div id="app" class="hidden">
    <div class="status-bar" aria-hidden="true">
      <span>9:41</span>
      <span class="icons">●●● 5G ▮▮▮</span>
    </div>
    <header class="app-header">
      <div class="left">
        <div class="title" id="header-title">가계부</div>
        <div class="ctx-action" id="header-context"><span class="dot"></span><span>오늘</span></div>
      </div>
      <div class="actions">
        <button class="icon-btn" id="btn-search" title="검색" type="button">⌕</button>
        <button class="icon-btn" id="btn-settings" title="설정" type="button">⚙</button>
      </div>
    </header>

    <main>
      <section class="tab-content" id="tab-home" data-tab="home"></section>
      <section class="tab-content hidden" id="tab-finance" data-tab="finance"></section>
      <section class="tab-content hidden" id="tab-tx" data-tab="tx"></section>
      <section class="tab-content hidden" id="tab-cart" data-tab="cart"></section>
      <section class="tab-content hidden" id="tab-mindbank" data-tab="mindbank"></section>
      <section class="tab-content hidden" id="tab-urge" data-tab="urge"></section>
      <section class="tab-content hidden" id="tab-settings" data-tab="settings"></section>
      <section class="tab-content hidden" id="tab-review" data-tab="review"></section>
      <section class="tab-content hidden" id="tab-settle" data-tab="settle"></section>
      <section class="tab-content hidden" id="tab-report" data-tab="report"></section>
    </main>

    <div id="modals-container"></div>
    <div id="toast-container"></div>

    <nav class="bottom-nav">
      <button data-tab="home" class="active"><span class="icon">⌂</span><span>홈</span></button>
      <button data-tab="finance"><span class="icon">△</span><span>목표</span></button>
      <button data-tab="tx"><span class="icon">◇</span><span>거래</span></button>
      <button data-tab="cart"><span class="icon">□</span><span>선택</span></button>
      <button data-tab="review"><span class="icon">▣</span><span>검토</span></button>
    </nav>
  </div>

  <script type="module" src="./app.js?v=20260506-apk-download"></script>
</body>
</html>
