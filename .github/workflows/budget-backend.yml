name: Budget Backend Jobs

on:
  repository_dispatch:
    types:
      - budget_recipe_sync
  workflow_dispatch:
    inputs:
      mode:
        description: "sync or recipes"
        required: true
        default: "sync"
        type: choice
        options:
          - sync
          - recipes
      since:
        description: "Optional sync date, YYYY-MM-DD"
        required: false
      max:
        description: "Optional Gmail message max"
        required: false
  schedule:
    - cron: "0 23 * * *"
    - cron: "17 */6 * * *"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'sync')
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      USER_UID: ${{ secrets.USER_UID }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      TOMATO_OWNER_ID: ${{ secrets.TOMATO_OWNER_ID }}
      TOMATODEV_READER_EMAIL: ${{ secrets.TOMATODEV_READER_EMAIL }}
      TOMATODEV_READER_PASSWORD: ${{ secrets.TOMATODEV_READER_PASSWORD }}
      BUDGET_SYNC_SINCE: ${{ github.event_name == 'workflow_dispatch' && inputs.since || '' }}
      BUDGET_SYNC_MAX: ${{ github.event_name == 'workflow_dispatch' && inputs.max || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Poll Gmail receipts
        run: node scripts/github-sync-latest.mjs

  recipes:
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'budget_recipe_sync') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'recipes') ||
      (github.event_name == 'schedule' && github.event.schedule == '17 */6 * * *')
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      USER_UID: ${{ secrets.USER_UID }}
      BUDGET_RECIPE_MAX: ${{ github.event.client_payload.max || inputs.max || '10' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Analyze pending recipe videos
        run: node scripts/github-recipe-sync.mjs

