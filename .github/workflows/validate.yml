name: Validate

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUDGET_VERIFY_SKIP_APK_ARTIFACT: 1

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run contract tests
        run: npm test

      - name: Run project verification
        run: npm run verify

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CI 러너에는 사전 설치 브라우저가 없으므로 여기서 설치한다(이 실행 환경과
      # 달리 CI 에서는 install 이 필요·정상). 로컬 사전 설치 환경에서는 절대 실행 금지.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E (smoke + visual regression)
        run: npm run test:e2e

      # 시각 diff 실패가 CI 를 실패시키는 것이 의도된 게이팅이다. 실패 시 실제/기대/
      # diff 스크린샷과 리포트를 아티팩트로 올려 베이스라인 갱신에 활용한다.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (actual/diff screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
